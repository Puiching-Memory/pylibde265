name: Build and Publish  
  
on:  
  # Trigger the workflow on release events  
  release:  
    types: [created]  
  
jobs:  
  build:  
    name: Build distribution for Python ${{ matrix.python-version }} windows_x64
    runs-on: windows-latest  
    strategy:  
      matrix:  
        python-version: ["3.8", "3.9", "3.10", "3.11"]  
  
    steps:  
    - uses: actions/checkout@v4  
  
    - name: Set up Python ${{ matrix.python-version }}  
      uses: actions/setup-python@v5  
      with:  
        python-version: ${{ matrix.python-version }}  
  
    - name: Install pypa/build  
      run: python -m pip install build>=1.2.1 --user  
  
    - name: Build a binary wheel and a source tarball  
      run: python -m build  
  
    - name: Store the distribution packages  
      uses: actions/upload-artifact@v4  
      with:  
        name: python-package-distributions-${{ matrix.python-version }}  
        path: dist/

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/<your-pypi-project-name>
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
    # retrieve your distributions here

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
    
    
    