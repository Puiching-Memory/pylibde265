[build-system]
requires = ["hatchling","hatch-ci"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel.hooks.cython]
dependencies = ["hatch-cython"]

[tool.hatch.build.targets.wheel.hooks.cython.options]
#includes = ["src/pylibde265/libde265/"]
includes = []
libraries = ["de265"]
library_dirs = ["D:/GitHub/pylibde265/src/pylibde265/lib"]
include_numpy = false
include_pyarrow = false

directives = { boundscheck = false, nonecheck = false, language_level = 3, binding = true }
compile_args = []

[tool.hatch.build.targets.sdist]
exclude = [
  "/.github",
  "/.vscode",
  "/trashcan",
  "/test",
  "/multimedia",
]

[tool.hatch.build.targets.wheel]
packages = ["src/pylibde265"]

[tool.hatch]

[tool.hatch.version]
path = "src/pylibde265/__init__.py"
pattern = "BUILD = 'b(?P<version>[^']+)'"

[tool.hatch.build.hooks.ci]
path = "src/pylibde265/__init__.py"
pattern = "BUILD = 'b(?P<version>[^']+)'"

# performs these string replacements
process-replace = [
    ["re:(replace-me)", "[\\\\1]"],
    ["string-to-replace", "replacement-string"]
]

# before jinja process these
process-paths = [
    "src/project/template.jinja2"
]





[project]
name = "pylibde265"
#version = "0.0.1"
dynamic = ["version"]
authors = [
  { name="梦归云帆", email="1138663075@qq.com" },
]
description = "python binding implementation of libde265, based on cython"
keywords = ["libde265", "h265", "vedio", "decode", "mp4"]
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
  "loguru",
  "cupy-cuda12x",
  "scipy",
  "numpy",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Cython",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Operating System :: Microsoft :: Windows",
]

[project.optional-dependencies]
dependencies = [
]

[tool.cyright]

[project.urls]
Homepage = "https://github.com/Puiching-Memory/pylibde265"
Issues = "https://github.com/Puiching-Memory/pylibde265/issues"